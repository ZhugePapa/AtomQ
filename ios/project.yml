name: AtomQ
options:
  bundleIdPrefix: com.atomq
settings:
  base:
    SWIFT_VERSION: 5.10
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  AtomQ:
    type: application
    platform: iOS
    sources:
      - path: AtomQ
        excludes:
          - Resources/default_cards/**
    resources:
      - path: AtomQ/Resources/SVG
        type: folder
      - path: AtomQ/Resources/default_cards
        type: folder
      - path: AtomQ/Resources/Markdown
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atomq.home.static
        INFOPLIST_FILE: AtomQ/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
schemes:
  AtomQ:
    build:
      targets:
        AtomQ: all
    run:
      config: Debug
